# 1. 워크플로우의 이름 (GitHub Actions 탭에 표시될 이름)
name: CI-Test

# 2. 실행 조건 (언제 자동화를 시작할 것인가?)
on:
  push:
    # 'master' 브랜치에 코드가 올라올(push) 때마다 실행해라
    branches: [ "master" ]

# 3. 실제 수행할 작업들
jobs:
  # 'build'라는 이름의 작업을 정의
  build:
    # 어떤 운영체제에서 실행할 것인가? (GitHub이 제공하는 가상 우분투 서버)
    runs-on: ubuntu-latest

    # 작업의 세부 단계들
    steps:
      # (1) 내 저장소의 코드를 가상 서버로 가져오기 (체크아웃)
      - uses: actions/checkout@v4

      # (2) 내가 직접 명령어를 실행하는 단계
      - name: Run Hello World
        # 리눅스 터미널 명령어로 메시지 출력 (자동화 성공 여부 확인용)
        run: echo "GitHub Actions 성공하였습니다!"
