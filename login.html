<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 서비스 이름</title>
    <style>
        /* 기본 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }

        .login-container {
            background-color: white;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2d3436;
        }

        header p {
            font-size: 14px;
            color: #636e72;
            margin-bottom: 30px;
        }

        /* 입력 폼 스타일 */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #0984e3;
            box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #0984e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0747a6;
        }

        /* 하단 링크 스타일 */
        .footer-links {
            margin-top: 25px;
            font-size: 13px;
            color: #b2bec3;
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .footer-links li a {
            text-decoration: none;
            color: #636e72;
            transition: color 0.2s;
        }

        .footer-links li a:hover {
            color: #0984e3;
            text-decoration: underline;
        }

        /* 구분선 */
        .divider {
            margin: 20px 0;
            border-bottom: 1px solid #f1f2f6;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <header>
            <h1>반갑습니다!! 👋</h1>
            <p>서비스를 이용하시려면 로그인해주세요.</p>
        </header>

        <main>
            <form action="site.html">
                <div class="input-group">
                    <input type="text" placeholder="아이디" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="비밀번호" required>
                </div>
                <button type="submit">로그인</button>
            </form>

            <div class="divider"></div>

            <ul class="footer-links">
                <li><a href="https://www.google.co.kr">회원가입</a></li>
                <li>•</li>
                <li><a href="#">비밀번호 찾기</a></li>
            </ul>
        </main>
    </div>

</body>

</html>
